name: Tests and Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      working-directory: ./trading_bot
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8
    
    - name: Lint with flake8
      working-directory: ./trading_bot
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --ignore=E501,W503
      continue-on-error: true
    
    - name: Run indicator tests
      working-directory: ./trading_bot
      run: |
        python tests/test_indicators_extended.py
    
    - name: Run backtest (smoke test)
      working-directory: ./trading_bot
      run: |
        export PYTHONPATH=/github/workspace/trading_bot:$PYTHONPATH
        timeout 120 python scripts/backtest.py BTC-USDT 4H --lookback=100 --output=test_backtest.json || true
      continue-on-error: true

  logging-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Check logging in key files
      run: |
        echo "Checking position_state.py for logging..."
        grep -q "get_logger" trading_bot/services/position_state.py && echo "✓ Logging found" || echo "✗ Logging NOT found"
        
        echo "Checking index.js for console logs..."
        grep -q "console.log\|console.error" trading_bot/index.js && echo "✓ Logs found" || echo "✗ Logs NOT found"
        
        echo "Checking telegram.py for logging..."
        grep -q "self.logger" trading_bot/notifications/telegram.py && echo "✓ Logging found" || echo "✗ Logging NOT found"
