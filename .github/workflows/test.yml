name: Trading Bot CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run backtest daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    # Step 1: Install dependencies (pip install -r requirements.txt)
    - name: Install dependencies
      working-directory: ./trading_bot
      run: |
        python -m pip install --upgrade pip
        echo "📦 Installing requirements..."
        pip install -r requirements.txt
        pip install pytest flake8
        echo "✓ Dependencies installed"
    
    # Step 2: Lint code (flake8)
    - name: Lint with flake8
      working-directory: ./trading_bot
      run: |
        echo "🔍 Running flake8 linter..."
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --ignore=E501,W503
        echo "✓ Lint check complete"
      continue-on-error: true
    
    # Step 3: Run unit tests
    - name: Run unit tests (test_indicators_extended.py)
      working-directory: ./trading_bot
      run: |
        echo "🧪 Running unit tests..."
        python tests/test_indicators_extended.py
        echo "✓ All tests passed"
    
    # Step 4: Run backtest
    - name: Run backtest (BTC-USDT 4H, 300 candles)
      working-directory: ./trading_bot
      run: |
        echo "📊 Running backtest..."
        export PYTHONPATH=/github/workspace/trading_bot:$PYTHONPATH
        timeout 180 python scripts/backtest.py BTC-USDT 4H --lookback=300 --output=backtest_results.json || true
        echo "✓ Backtest complete"
      continue-on-error: true
    
    # Step 5: Validate main.py syntax
    - name: Validate main.py
      working-directory: ./trading_bot
      run: |
        echo "✓ Checking main.py syntax..."
        python -m py_compile main.py
        echo "✓ main.py is valid"
    
    # Save backtest results as artifacts
    - name: Upload backtest results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: backtest-results-py${{ matrix.python-version }}
        path: trading_bot/backtest_results.json
        retention-days: 30

  quality-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    # Step 1: Check logging implementation
    - name: Check logging in key files
      run: |
        echo "📋 Checking logging implementation..."
        echo "✓ Checking position_state.py for logging..."
        grep -q "get_logger" trading_bot/services/position_state.py && echo "  ✓ Logging found" || echo "  ✗ Logging NOT found"
        
        echo "✓ Checking index.js for console logs..."
        grep -q "console.log\|console.error" trading_bot/index.js && echo "  ✓ Logs found" || echo "  ✗ Logs NOT found"
        
        echo "✓ Checking telegram.py for logging..."
        grep -q "self.logger" trading_bot/notifications/telegram.py && echo "  ✓ Logging found" || echo "  ✗ Logging NOT found"
    
    # Step 2: Verify project structure
    - name: Verify project structure
      run: |
        echo "📁 Verifying project structure..."
        test -d trading_bot/core && echo "  ✓ core/ directory exists"
        test -d trading_bot/services && echo "  ✓ services/ directory exists"
        test -d trading_bot/notifications && echo "  ✓ notifications/ directory exists"
        test -d trading_bot/scripts && echo "  ✓ scripts/ directory exists"
        test -d trading_bot/tests && echo "  ✓ tests/ directory exists"
        test -f trading_bot/config.py && echo "  ✓ config.py exists"
        test -f trading_bot/main.py && echo "  ✓ main.py exists"
        test -f trading_bot/README.md && echo "  ✓ README.md exists"
        echo "✓ Project structure verified"
