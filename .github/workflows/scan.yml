name: Crypto Scanner

on:
  schedule:
    # Запуск каждые 30 минут (можно поменять на 0 * * * * для каждого часа)
    - cron: '*/30 * * * *'
  workflow_dispatch: # Чтобы можно было запустить вручную кнопкой

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install ccxt requests

      - name: Run Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python scan.py

