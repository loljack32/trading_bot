name: Scan Market

on:
  schedule:
    # Запуск каждый час
    - cron: '0 * * * *'
  workflow_dispatch:  # Ручной запуск

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Run scanner and send to Telegram
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python -c "
        import ccxt
        import requests
        import json
        from scanner import scan_market
        
        # Загружаем данные
        with open('data.json', 'r') as f:
            data = json.load(f)
        
        if data['balance'] == 0:
            print('Баланс не установлен')
            exit(0)
        
        # Сканируем рынок
        results = scan_market(data['balance'], data['risk_percent'])
        
        if results:
            for result in results[:3]:
                message = (
                    f'🚨 <b>СЕТУП SFP+MSS</b>\n\n'
                    f'💎 Монета: {result[\"symbol\"]}\n'
                    f'📉 Направление: {result[\"direction\"]}\n'
                    f'📍 Вход: ${result[\"entry\"]:.2f}\n'
                    f'🛑 Стоп: ${result[\"stop\"]:.2f}\n'
                    f'🎯 TP1: ${result[\"tp1\"]:.2f}\n'
                    f'🎯 TP2: ${result[\"tp2\"]:.2f}\n\n'
                    f'💰 Размер позиции: ${result[\"position_size\"]:.2f}\n'
                    f'⚡ Плечо: {result[\"leverage\"]}x\n'
                    f' Риск: ${result[\"risk_amount\"]:.2f}\n\n'
                    f' R:R TP1: {result[\"rr_tp1\"]:.2f}\n'
                    f'📊 R:R TP2: {result[\"rr_tp2\"]:.2f}'
                )
                
                # Отправляем в Telegram
                url = f'https://api.telegram.org/bot{os.environ[\"TELEGRAM_BOT_TOKEN\"]}/sendMessage'
                payload = {
                    'chat_id': os.environ['TELEGRAM_CHAT_ID'],
                    'text': message,
                    'parse_mode': 'HTML'
                }
                requests.post(url, json=payload)
        
        print(f'Сканирование завершено. Найдено сетапов: {len(results)}')
        "

